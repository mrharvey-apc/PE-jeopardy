<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeopardy! — VCE Physical Education</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy:  #060b2e;
  --royal: #0d1f6e;
  --gold:  #f5c518;
  --gold2: #e8a800;
  --white: #ffffff;
  --light: #e8edf8;
  --muted: #8899bb;
  --header-h: clamp(70px, 10vh, 100px);
  --radius: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.45);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Barlow', sans-serif; background: var(--navy); color: var(--white); overflow: hidden; }

/* SCREENS */
.screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.35s ease; overflow-y: auto; }
.screen.active { opacity: 1; pointer-events: all; }

/* STARFIELD */
#stars { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
.star { position: absolute; background: var(--white); border-radius: 50%; animation: twinkle var(--dur) ease-in-out infinite alternate; }
@keyframes twinkle { from { opacity: 0.1; } to { opacity: 0.7; } }

/* ---- SETUP SCREEN ---- */
#screen-setup { gap: 0; padding: 20px; background: radial-gradient(ellipse at 50% 0%, #1a2a80 0%, var(--navy) 70%); }
.setup-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 24px; position: relative; z-index: 1; }
.logo-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(52px, 10vw, 100px); color: var(--gold); letter-spacing: 6px; line-height: 1; text-shadow: 0 0 40px rgba(245,197,24,0.4), 4px 4px 0px #8a6a00; text-align: center; }
.logo-sub { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(13px, 2vw, 18px); color: var(--muted); letter-spacing: 4px; text-transform: uppercase; text-align: center; margin-top: 4px; }
.section-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
.card-section { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius); padding: 16px 20px; }
.api-row { display: flex; gap: 10px; }
.api-row input { flex: 1; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: var(--white); font-family: 'Barlow', sans-serif; font-size: 14px; padding: 10px 14px; outline: none; transition: border-color 0.2s; }
.api-row input:focus { border-color: var(--gold); }
.api-row input::placeholder { color: var(--muted); }
.api-note { font-size: 11px; color: var(--muted); margin-top: 8px; }
.error-msg { color: #ff6b6b; font-size: 13px; margin-top: 6px; }
.topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 9px; }
.topic-card { display: flex; align-items: center; gap: 11px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px 14px; cursor: pointer; transition: all 0.18s; user-select: none; }
.topic-card:hover { border-color: rgba(245,197,24,0.5); background: rgba(245,197,24,0.07); }
.topic-card.selected { border-color: var(--gold); background: rgba(245,197,24,0.14); }
.topic-icon { font-size: 22px; flex-shrink: 0; }
.topic-name { font-weight: 700; font-size: 14px; }
.topic-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
.topic-check { margin-left: auto; width: 20px; height: 20px; border: 2px solid var(--muted); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 11px; transition: all 0.18s; }
.topic-card.selected .topic-check { background: var(--gold); border-color: var(--gold); color: var(--navy); font-weight: 900; }
.topic-limit-note { font-size: 12px; color: var(--muted); margin-top: 7px; }
.teams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 9px; }
.team-input-wrap { display: flex; align-items: center; gap: 8px; }
.team-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.team-input { flex: 1; background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; color: var(--white); font-family: 'Barlow', sans-serif; font-size: 14px; padding: 9px 12px; outline: none; transition: border-color 0.2s; }
.team-input:focus { border-color: var(--gold); }
.team-input::placeholder { color: var(--muted); }
.btn-start { display: block; width: 100%; max-width: 340px; margin: 0 auto; background: var(--gold); color: var(--navy); font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 4px; border: none; border-radius: var(--radius); padding: 16px 32px; cursor: pointer; transition: all 0.18s; box-shadow: 0 4px 20px rgba(245,197,24,0.35); }
.btn-start:hover { background: #ffe033; transform: translateY(-2px); box-shadow: 0 8px 28px rgba(245,197,24,0.5); }
.btn-start:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ---- LOADING SCREEN ---- */
#screen-loading { gap: 28px; background: radial-gradient(ellipse at 50% 50%, #1a2a80 0%, var(--navy) 70%); }
.loading-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(32px, 6vw, 60px); color: var(--gold); letter-spacing: 5px; text-align: center; }
.loading-sub { color: var(--muted); font-size: 15px; text-align: center; }
.progress-bar-wrap { width: min(480px, 90vw); background: rgba(255,255,255,0.1); border-radius: 999px; height: 8px; overflow: hidden; }
.progress-bar { height: 100%; background: var(--gold); border-radius: 999px; width: 0%; transition: width 0.5s ease; }
.loading-steps { display: flex; flex-direction: column; gap: 10px; width: min(480px, 90vw); }
.loading-step { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--muted); transition: color 0.3s; }
.loading-step.done { color: #7fff7f; }
.loading-step.active { color: var(--white); }
.step-icon { font-size: 18px; width: 24px; text-align: center; }

/* ---- BOARD SCREEN ---- */
#screen-board { flex-direction: column; padding: 0; justify-content: flex-start; overflow: hidden; }
.board-wrapper { display: flex; flex-direction: column; width: 100%; height: 100vh; }
.score-bar { display: flex; align-items: stretch; background: var(--royal); border-bottom: 3px solid var(--gold); min-height: 62px; flex-shrink: 0; }
.score-team { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px 8px; border-right: 1px solid rgba(255,255,255,0.1); transition: background 0.3s; position: relative; }
.score-team.active-team { background: rgba(245,197,24,0.15); }
.score-team.active-team::after { content: '▼'; position: absolute; bottom: -18px; color: var(--gold); font-size: 11px; z-index: 5; }
.score-team-name { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(10px, 1.8vw, 16px); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
.score-value { font-family: 'Bebas Neue', sans-serif; font-size: clamp(20px, 3.5vw, 32px); color: var(--gold); line-height: 1; }
.turn-bar { background: rgba(245,197,24,0.1); border-bottom: 1px solid rgba(245,197,24,0.18); text-align: center; padding: 6px; font-size: 13px; font-weight: 600; color: var(--gold); flex-shrink: 0; letter-spacing: 1px; }
.jeopardy-grid { flex: 1; display: grid; overflow: hidden; }
.grid-cell { display: flex; align-items: center; justify-content: center; border: 2px solid rgba(255,255,255,0.06); text-align: center; padding: 6px; position: relative; overflow: hidden; }
.grid-cell.header { background: var(--royal); cursor: default; flex-direction: column; gap: 4px; border-bottom: 3px solid rgba(245,197,24,0.3); }
.header-icon { font-size: clamp(18px, 3vw, 26px); }
.header-text { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(10px, 1.6vw, 16px); font-weight: 900; letter-spacing: 1px; text-transform: uppercase; color: var(--white); line-height: 1.1; }
.grid-cell.point { background: #0a1550; cursor: pointer; flex-direction: column; }
.grid-cell.point:hover:not(.answered) { background: #152070; transform: scale(1.04); z-index: 2; box-shadow: 0 0 20px rgba(245,197,24,0.3); }
.point-value { font-family: 'Bebas Neue', sans-serif; font-size: clamp(24px, 4.5vw, 54px); color: var(--gold); text-shadow: 2px 2px 0 rgba(0,0,0,0.5); line-height: 1; }
.grid-cell.answered { background: #050a28 !important; cursor: default !important; transform: none !important; }
.grid-cell.answered .point-value { display: none; }
.grid-cell.answered::after { content: '✓'; color: rgba(255,255,255,0.1); font-size: clamp(28px, 6vw, 60px); }

/* ---- MODAL ---- */
.modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.87); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; padding: 20px; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--royal); border: 3px solid var(--gold); border-radius: 16px; width: min(820px, 95vw); padding: 28px 36px; display: flex; flex-direction: column; gap: 18px; box-shadow: 0 0 60px rgba(245,197,24,0.2), var(--shadow); transform: scale(0.92); transition: transform 0.3s; max-height: 90vh; overflow-y: auto; }
.modal-overlay.open .modal { transform: scale(1); }
.modal-meta { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.modal-category { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
.modal-points { font-family: 'Bebas Neue', sans-serif; font-size: 44px; color: var(--gold); line-height: 1; }
.modal-clue { font-size: clamp(17px, 3.2vw, 28px); font-weight: 600; text-align: center; color: var(--white); line-height: 1.45; padding: 14px 0; border-top: 1px solid rgba(255,255,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.1); }
.modal-answer-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.modal-answer-wrap { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 16px 22px; text-align: center; min-height: 64px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.modal-answer-text { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(15px, 2.8vw, 22px); font-weight: 700; color: #7dff9a; opacity: 0; transition: opacity 0.4s; }
.modal-answer-text.revealed { opacity: 1; }
.modal-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.btn-reveal { background: var(--gold); color: var(--navy); font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 900; letter-spacing: 2px; border: none; border-radius: 8px; padding: 12px 28px; cursor: pointer; transition: all 0.18s; }
.btn-reveal:hover { background: #ffe033; transform: translateY(-1px); }
.team-award-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.btn-award { font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 700; border: none; border-radius: 8px; padding: 10px 16px; cursor: pointer; transition: all 0.18s; }
.btn-award:hover { filter: brightness(1.15); transform: translateY(-1px); }
.btn-skip { background: rgba(255,255,255,0.09); color: var(--muted); font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600; border: 1px solid rgba(255,255,255,0.14); border-radius: 8px; padding: 10px 18px; cursor: pointer; transition: all 0.18s; }
.btn-skip:hover { background: rgba(255,255,255,0.17); color: var(--white); }
.modal-instructions { font-size: 12px; color: var(--muted); text-align: center; }

/* ---- FINAL SCREEN ---- */
#screen-final { background: radial-gradient(ellipse at 50% 20%, #1a2a80 0%, var(--navy) 65%); gap: 22px; padding: 32px 20px; }
.final-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(44px, 9vw, 90px); color: var(--gold); letter-spacing: 6px; text-shadow: 0 0 40px rgba(245,197,24,0.4); text-align: center; }
.final-winner-box { background: rgba(245,197,24,0.1); border: 2px solid var(--gold); border-radius: 16px; padding: 22px 40px; text-align: center; }
.final-winner-label { font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.final-winner-name { font-family: 'Bebas Neue', sans-serif; font-size: clamp(36px, 7vw, 70px); line-height: 1; }
.final-winner-score { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; color: var(--white); margin-top: 4px; }
.final-leaderboard { width: min(540px, 95vw); display: flex; flex-direction: column; gap: 9px; }
.lb-row { display: flex; align-items: center; gap: 13px; background: rgba(255,255,255,0.05); border-radius: 10px; padding: 11px 16px; }
.lb-rank { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--muted); width: 26px; flex-shrink: 0; }
.lb-rank.first { color: var(--gold); }
.lb-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
.lb-name { flex: 1; font-weight: 700; font-size: 15px; }
.lb-score { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--gold); }
.btn-play-again { background: var(--gold); color: var(--navy); font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 4px; border: none; border-radius: 10px; padding: 15px 48px; cursor: pointer; transition: all 0.18s; box-shadow: 0 4px 20px rgba(245,197,24,0.3); }
.btn-play-again:hover { background: #ffe033; transform: translateY(-2px); }

/* CONFETTI */
.confetti-piece { position: fixed; z-index: 200; border-radius: 2px; animation: confettiFall linear forwards; pointer-events: none; }
@keyframes confettiFall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
</style>
</head>
<body>

<div id="stars"></div>

<!-- SETUP -->
<div class="screen active" id="screen-setup">
  <div class="setup-container">
    <div>
      <div class="logo-title">JEOPARDY!</div>
      <div class="logo-sub">VCE Physical Education · AI-Powered Edition</div>
    </div>

    <div class="error-msg" id="api-error" style="text-align:center"></div>

    <div class="card-section">
      <div class="section-label">Select Topics — 2 to 6</div>
      <div class="topic-grid" id="topic-grid"></div>
      <div class="topic-limit-note" id="topic-limit-note">Select between 2 and 6 topics to play.</div>
    </div>

    <div class="card-section">
      <div class="section-label">Teams — 2 to 6</div>
      <div class="teams-grid" id="teams-grid"></div>
      <div class="error-msg" id="team-error"></div>
    </div>

    <button class="btn-start" id="btn-start" disabled>Generate Questions &amp; Play</button>
  </div>
</div>

<!-- LOADING -->
<div class="screen" id="screen-loading">
  <div class="loading-title">Generating Questions…</div>
  <div class="loading-sub">Claude is reading the textbook and crafting your game.</div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  <div class="loading-steps" id="loading-steps"></div>
</div>

<!-- BOARD -->
<div class="screen" id="screen-board">
  <div class="board-wrapper">
    <div class="score-bar" id="score-bar"></div>
    <div class="turn-bar" id="turn-bar"></div>
    <div class="jeopardy-grid" id="jeopardy-grid"></div>
  </div>
</div>

<!-- QUESTION MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-meta">
      <div class="modal-category" id="modal-category"></div>
      <div class="modal-points" id="modal-points"></div>
    </div>
    <div class="modal-clue" id="modal-clue"></div>
    <div>
      <div class="modal-answer-label">Answer</div>
      <div class="modal-answer-wrap">
        <div class="modal-answer-text" id="modal-answer"></div>
      </div>
    </div>
    <div class="modal-actions" id="modal-actions">
      <button class="btn-reveal" id="btn-reveal">Reveal Answer</button>
    </div>
    <div class="modal-instructions" id="modal-instructions">Read the clue aloud, then click "Reveal Answer" when ready.</div>
  </div>
</div>

<!-- FINAL -->
<div class="screen" id="screen-final">
  <div class="final-title">🏆 Game Over!</div>
  <div class="final-winner-box">
    <div class="final-winner-label">Winner</div>
    <div class="final-winner-name" id="final-winner-name"></div>
    <div class="final-winner-score" id="final-winner-score"></div>
  </div>
  <div class="final-leaderboard" id="final-leaderboard"></div>
  <button class="btn-play-again" id="btn-play-again">Play Again</button>
</div>

<script src="js/textbook-content.js"></script>
<script src="js/ai-engine.js"></script>
<script src="js/game.js"></script>
<script>
/* ---- STARFIELD ---- */
(function(){
  const c = document.getElementById('stars');
  for(let i=0;i<120;i++){
    const s = document.createElement('div');
    s.className='star';
    const sz=Math.random()*2.5+0.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${(Math.random()*3+2).toFixed(1)}s;animation-delay:${(Math.random()*4).toFixed(1)}s;`;
    c.appendChild(s);
  }
})();

/* ---- SCREEN MANAGER ---- */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ---- TOPIC PICKER ---- */
let selectedTopics=[];
(function(){
  const grid=document.getElementById('topic-grid');
  TEXTBOOK_CONTENT.topics.forEach(t=>{
    const card=document.createElement('div');
    card.className='topic-card';
    card.dataset.id=t.id;
    card.innerHTML=`<div class="topic-icon">${t.icon}</div><div><div class="topic-name">${t.name}</div><div class="topic-desc">${t.description}</div></div><div class="topic-check">✓</div>`;
    card.addEventListener('click',()=>toggleTopic(t.id,card));
    grid.appendChild(card);
  });
})();

function toggleTopic(id,card){
  if(selectedTopics.includes(id)){
    selectedTopics=selectedTopics.filter(t=>t!==id);
    card.classList.remove('selected');
  } else {
    if(selectedTopics.length>=6){
      const n=document.getElementById('topic-limit-note');
      n.textContent='Maximum 6 topics allowed.'; n.style.color='#ff6b6b'; return;
    }
    selectedTopics.push(id); card.classList.add('selected');
  }
  const n=document.getElementById('topic-limit-note');
  n.textContent=`Select between 2 and 6 topics. (${selectedTopics.length} selected)`; n.style.color='';
  validateForm();
}

/* ---- TEAM INPUTS ---- */
(function(){
  const grid=document.getElementById('teams-grid');
  const defs=['Team 1','Team 2','Team 3','Team 4','Team 5','Team 6'];
  for(let i=0;i<6;i++){
    const w=document.createElement('div'); w.className='team-input-wrap';
    w.innerHTML=`<div class="team-dot" style="background:${TEAM_COLORS[i].bg}"></div><input class="team-input" type="text" placeholder="${defs[i]}" maxlength="20" />`;
    w.querySelector('input').addEventListener('input',validateForm);
    grid.appendChild(w);
  }
})();

function getTeamNames(){
  return Array.from(document.querySelectorAll('.team-input')).map(i=>i.value.trim()||i.placeholder);
}

function validateForm(){
  document.getElementById('btn-start').disabled=!(selectedTopics.length>=2);
}

/* ---- START ---- */
document.getElementById('btn-start').addEventListener('click',async()=>{
  const teamNames=getTeamNames().filter(n=>n);
  if(selectedTopics.length<2){document.getElementById('topic-limit-note').textContent='Please select at least 2 topics.';return;}
  if(teamNames.length<2){document.getElementById('team-error').textContent='Please enter at least 2 teams.';return;}

  GAME.init(teamNames,selectedTopics);
  showScreen('screen-loading');
  buildLoadingSteps();

  try{
    await AI_ENGINE.generateAll(selectedTopics,(done,total,topicName)=>{
      updateLoadingProgress(done,total,topicName);
    });
    GAME.setQuestions(AI_ENGINE.generatedQuestions);
    renderBoard();
    showScreen('screen-board');
  } catch(err){
    document.getElementById('api-error').textContent='Error: '+err.message;
    showScreen('screen-setup');
  }
});

/* ---- LOADING ---- */
function buildLoadingSteps(){
  const c=document.getElementById('loading-steps'); c.innerHTML='';
  selectedTopics.forEach(id=>{
    const t=TEXTBOOK_CONTENT.topics.find(x=>x.id===id);
    const s=document.createElement('div'); s.className='loading-step'; s.id=`step-${id}`;
    s.innerHTML=`<span class="step-icon">${t.icon}</span>Generating: <strong>${t.name}</strong>`;
    c.appendChild(s);
  });
  document.getElementById('progress-bar').style.width='0%';
}
function updateLoadingProgress(done,total,topicName){
  document.getElementById('progress-bar').style.width=Math.round(done/total*100)+'%';
  const topic=TEXTBOOK_CONTENT.topics.find(t=>t.name===topicName);
  if(topic){
    const s=document.getElementById(`step-${topic.id}`);
    if(s){s.classList.remove('active');s.classList.add('done');s.querySelector('.step-icon').textContent='✅';}
  }
  document.querySelectorAll('.loading-step:not(.done)')[0]?.classList.add('active');
}

/* ---- BOARD ---- */
const POINT_VALUES=[200,400,600,800,1000];

function renderBoard(){
  renderScoreBar(); renderTurnBar(); renderGrid();
}

function renderScoreBar(){
  const bar=document.getElementById('score-bar'); bar.innerHTML='';
  GAME.teams.forEach((team,i)=>{
    const div=document.createElement('div');
    div.className='score-team'+(i===GAME.currentTeamIndex?' active-team':'');
    div.id=`score-team-${team.id}`;
    div.innerHTML=`<div class="score-team-name" style="color:${team.color.bg}">${team.name}</div><div class="score-value">$${team.score.toLocaleString()}</div>`;
    bar.appendChild(div);
  });
}

function renderTurnBar(){
  const team=GAME.getCurrentTeam();
  document.getElementById('turn-bar').textContent=`${team.name}'s turn to pick`;
}

function renderGrid(){
  const grid=document.getElementById('jeopardy-grid');
  const cols=selectedTopics.length;
  grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  grid.style.gridTemplateRows=`var(--header-h) repeat(${POINT_VALUES.length},1fr)`;
  grid.innerHTML='';

  // Headers
  selectedTopics.forEach(topicId=>{
    const t=TEXTBOOK_CONTENT.topics.find(x=>x.id===topicId);
    const cell=document.createElement('div');
    cell.className='grid-cell header';
    cell.innerHTML=`<div class="header-icon">${t.icon}</div><div class="header-text">${t.name}</div>`;
    grid.appendChild(cell);
  });

  // Points
  POINT_VALUES.forEach(pts=>{
    selectedTopics.forEach(topicId=>{
      const cell=document.createElement('div');
      const answered=GAME.isAnswered(topicId,pts);
      cell.className='grid-cell point'+(answered?' answered':'');
      if(!answered){
        cell.innerHTML=`<div class="point-value">$${pts}</div>`;
        cell.addEventListener('click',()=>openQuestion(topicId,pts));
      }
      grid.appendChild(cell);
    });
  });
}

/* ---- MODAL ---- */
let answerRevealed=false;

function openQuestion(topicId,points){
  const q=GAME.openQuestion(topicId,points);
  if(!q)return;
  answerRevealed=false;
  document.getElementById('modal-category').textContent=q.category||GAME.getTopic(topicId)?.name||'';
  document.getElementById('modal-points').textContent=`$${points}`;
  document.getElementById('modal-clue').textContent=q.clue;
  document.getElementById('modal-answer').textContent=q.answer;
  document.getElementById('modal-answer').classList.remove('revealed');
  const actions=document.getElementById('modal-actions');
  actions.innerHTML=`<button class="btn-reveal">Reveal Answer</button>`;
  actions.querySelector('.btn-reveal').onclick=revealAnswer;
  document.getElementById('modal-instructions').textContent='Read the clue aloud, then click "Reveal Answer" when ready.';
  document.getElementById('modal').classList.add('open');
}

function revealAnswer(){
  if(answerRevealed)return;
  answerRevealed=true;
  document.getElementById('modal-answer').classList.add('revealed');
  document.getElementById('modal-instructions').textContent='Award points to the correct team, or skip if no one answered correctly.';
  const actions=document.getElementById('modal-actions'); actions.innerHTML='';
  const tg=document.createElement('div'); tg.className='team-award-grid';
  GAME.teams.forEach(team=>{
    const btn=document.createElement('button'); btn.className='btn-award';
    btn.style.background=team.color.bg; btn.style.color=team.color.text;
    btn.textContent=`✓ ${team.name}`;
    btn.onclick=()=>awardPoints(team.id);
    tg.appendChild(btn);
  });
  actions.appendChild(tg);
  const skip=document.createElement('button'); skip.className='btn-skip';
  skip.textContent='No correct answer — skip'; skip.onclick=skipQuestion;
  actions.appendChild(skip);
}

function awardPoints(teamId){
  closeModal();
  GAME.resolveQuestion(teamId,true);
  refreshBoard();
}

function skipQuestion(){
  closeModal();
  GAME.skipQuestion();
  refreshBoard();
}

function closeModal(){ document.getElementById('modal').classList.remove('open'); }

function refreshBoard(){
  if(GAME.phase==='final'){showFinalScreen();return;}
  renderScoreBar(); renderTurnBar(); renderGrid();
}

/* ---- FINAL ---- */
function showFinalScreen(){
  launchConfetti();
  const winner=GAME.getWinner();
  document.getElementById('final-winner-name').textContent=winner.name;
  document.getElementById('final-winner-name').style.color=winner.color.bg;
  document.getElementById('final-winner-score').textContent=`$${winner.score.toLocaleString()} points`;
  const lb=document.getElementById('final-leaderboard'); lb.innerHTML='';
  GAME.getRankedTeams().forEach((team,i)=>{
    const row=document.createElement('div'); row.className='lb-row';
    row.innerHTML=`<div class="lb-rank ${i===0?'first':''}">${i+1}</div><div class="lb-dot" style="background:${team.color.bg}"></div><div class="lb-name">${team.name}</div><div class="lb-score">$${team.score.toLocaleString()}</div>`;
    lb.appendChild(row);
  });
  showScreen('screen-final');
}

document.getElementById('btn-play-again').addEventListener('click',()=>{
  selectedTopics=[];
  document.querySelectorAll('.topic-card.selected').forEach(c=>c.classList.remove('selected'));
  document.getElementById('api-error').textContent='';
  document.getElementById('team-error').textContent='';
  document.getElementById('topic-limit-note').textContent='Select between 2 and 6 topics to play.';
  validateForm();
  showScreen('screen-setup');
});

/* ---- CONFETTI ---- */
function launchConfetti(){
  const colors=['#f5c518','#e63946','#2196f3','#4caf50','#ff9800','#9c27b0','#fff'];
  for(let i=0;i<130;i++){
    setTimeout(()=>{
      const el=document.createElement('div'); el.className='confetti-piece';
      el.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${Math.random()*8+5}px;height:${Math.random()*12+7}px;animation-duration:${(Math.random()*2+2).toFixed(1)}s;`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),5000);
    },Math.random()*2200);
  }
}
</script>
